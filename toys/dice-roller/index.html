    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Dice Roller",
        "url": "https://onepagetoys.com/toys/dice-roller/",
        "description": "Roll real 3D dice (d4–d20), solo or a whole pool at once — physics-based tumbling on green felt with cryptographically fair odds, a running total, and roll history.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires WebGL.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <canvas id="canvas" aria-label="3D dice on a felt table"></canvas>
    <div class="flash" id="flash" aria-hidden="true"></div>
    <div class="confetti" id="confetti" aria-hidden="true"></div>

    <div class="hud hud--top">
      <div class="readout" aria-live="polite">
        <span class="readout__eyebrow" id="rollLabel">Roll</span>
        <span class="readout__total" id="total">—</span>
        <span class="readout__detail" id="detail">roll a d6</span>
      </div>
      <div class="best" id="best">Best —</div>
    </div>

    <div class="hud hud--bottom">
      <div class="dietypes" role="group" aria-label="Die type">
        <button type="button" class="die-chip" data-sides="4">d4</button>
        <button type="button" class="die-chip is-on" data-sides="6">d6</button>
        <button type="button" class="die-chip" data-sides="8">d8</button>
        <button type="button" class="die-chip" data-sides="10">d10</button>
        <button type="button" class="die-chip" data-sides="12">d12</button>
        <button type="button" class="die-chip" data-sides="20">d20</button>
      </div>

      <div class="controls">
        <div class="count">
          <button type="button" class="count__btn" id="countDown" aria-label="Fewer dice">–</button>
          <span class="count__val"><span id="countVal">1</span><span class="count__unit">dice</span></span>
          <button type="button" class="count__btn" id="countUp" aria-label="More dice">+</button>
        </div>
        <button type="button" class="btn btn--primary" id="rollBtn">Roll</button>
        <button type="button" class="btn btn--ghost" id="clearBtn">Clear</button>
        <button type="button" class="btn btn--ghost" id="soundBtn" aria-pressed="true">Sound: on</button>
      </div>

      <ol class="history" id="history" aria-label="Recent totals"></ol>
    </div>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 005</span>
      <span class="frame__corner frame__corner--tr">Dice Roller</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">← onepagetoys.com</a></span>
      <span class="frame__corner frame__corner--br">Cryptographically fair</span>
    </div>

    <p class="hint" id="hint">flick to throw · or press Roll (R)</p>

    <script src="script.js?v=3" defer></script>
    <script src="../../assets/tip-jar.js?v=10" defer></script>
    <script src="../../assets/fullscreen.js?v=3" defer></script>
  </body>
</html>
