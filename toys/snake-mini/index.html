    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Snake",
        "url": "https://onepagetoys.com/toys/snake-mini/",
        "description": "Classic neon Snake: eat, grow, and chase a high score with keys, swipe, or an on-screen pad.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>

    <main class="stage">
      <div class="hud">
        <div class="stat"><span class="stat__label">Score</span><span class="stat__val" id="score">0</span></div>
        <div class="stat"><span class="stat__label best">Best</span><span class="stat__val" id="best">0</span></div>
      </div>

      <div class="boardwrap">
        <canvas id="board" class="board" width="500" height="500" aria-label="Snake board"></canvas>
        <div class="overlay" id="overlay">
          <p class="overlay__title" id="overTitle">Snake</p>
          <p class="overlay__sub" id="overSub">Arrows / WASD / swipe to play</p>
          <button type="button" class="btn btn--primary" id="startBtn">Play</button>
        </div>
      </div>

      <div class="pad" aria-label="Direction pad">
        <button type="button" class="pad__btn pad__up" data-dir="up" aria-label="Up">▲</button>
        <button type="button" class="pad__btn pad__left" data-dir="left" aria-label="Left">◀</button>
        <button type="button" class="pad__btn pad__down" data-dir="down" aria-label="Down">▼</button>
        <button type="button" class="pad__btn pad__right" data-dir="right" aria-label="Right">▶</button>
      </div>
    </main>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 012</span>
      <span class="frame__corner frame__corner--tr">Snake</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">← onepagetoys.com</a></span>
      <span class="frame__corner frame__corner--br">P to pause</span>
    </div>

    <script src="../../assets/tickets.js?v=1" defer></script>
    <script src="script.js?v=2" defer></script>
    <script src="../../assets/tip-jar.js?v=10" defer></script>
    <script src="../../assets/fullscreen.js?v=3" defer></script>
  </body>
