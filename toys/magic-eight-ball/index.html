    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Magic 8-Ball",
        "url": "https://onepagetoys.com/toys/magic-eight-ball/",
        "description": "Ask a yes/no question and shake the glossy magic 8-ball; the blue triangle surfaces with your answer.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },

  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>

    <main class="stage">
      <input
        id="question"
        class="question"
        type="text"
        maxlength="80"
        autocomplete="off"
        spellcheck="false"
        placeholder="Ask a yes / no question…"
        aria-label="Your question"
      />

      <button type="button" class="ball" id="ball" aria-label="Shake the magic 8-ball">
        <span class="ball__gloss" aria-hidden="true"></span>
        <span class="window" id="window">
          <span class="murk" aria-hidden="true"></span>
          <span class="triangle" id="triangle">
            <span class="answer" id="answer">8</span>
          </span>
        </span>
      </button>

      <p class="status" id="status" aria-live="polite">Think of a question, then shake.</p>
    </main>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 006</span>
      <span class="frame__corner frame__corner--tr">Magic 8-Ball</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">← onepagetoys.com</a></span>
      <span class="frame__corner frame__corner--br">For entertainment only</span>
    </div>

    <p class="hint" id="hint">tap the ball · or press space</p>

    <script src="../../assets/tickets.js?v=11" defer></script>
    <script src="../../assets/prizes.js?v=1" defer></script>
    <script src="script.js?v=5" defer></script>
    <script src="../../assets/tip-jar.js?v=10" defer></script>
    <script src="../../assets/fullscreen.js?v=3" defer></script>
