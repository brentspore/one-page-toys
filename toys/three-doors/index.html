    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Three Doors (Monty Hall)",
        "url": "https://onepagetoys.com/toys/three-doors/",
        "description": "The Monty Hall problem as a game: pick a door, the host reveals a goat, switch or stay, and watch switch vs stay win rates emerge.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>

  <body>
    <div class="bg" aria-hidden="true"></div>

    <main class="stage">
      <p class="status" id="status">Pick a door. One hides the prize.</p>

      <div class="doors" id="doors">
        <button class="door" data-i="0" aria-label="Door 1">
          <span class="door__inside" aria-hidden="true"></span>
          <span class="door__panel"><span class="door__num">1</span><span class="door__knob"></span></span>
        </button>
        <button class="door" data-i="1" aria-label="Door 2">
          <span class="door__inside" aria-hidden="true"></span>
          <span class="door__panel"><span class="door__num">2</span><span class="door__knob"></span></span>
        </button>
        <button class="door" data-i="2" aria-label="Door 3">
          <span class="door__inside" aria-hidden="true"></span>
          <span class="door__panel"><span class="door__num">3</span><span class="door__knob"></span></span>
        </button>
      </div>

      <div class="choice" id="choice" hidden>
        <button type="button" class="btn btn--primary" id="switchBtn">Switch</button>
        <button type="button" class="btn" id="stayBtn">Stay</button>
      </div>
      <button type="button" class="btn btn--primary" id="againBtn" hidden>Play again</button>

      <div class="stats">
        <div class="stat"><span class="stat__label">Plays</span><span class="stat__val" id="plays">0</span></div>
        <div class="stat"><span class="stat__label win">Switch wins</span><span class="stat__val" id="switchRate">–</span></div>
        <div class="stat"><span class="stat__label">Stay wins</span><span class="stat__val" id="stayRate">–</span></div>
      </div>
      <p class="lesson">Theory: switching wins <strong>2/3</strong> of the time, staying just <strong>1/3</strong>.</p>
    </main>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 010</span>
      <span class="frame__corner frame__corner--tr">Three Doors</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">← onepagetoys.com</a></span>
      <span class="frame__corner frame__corner--br">The Monty Hall problem</span>
    </div>
