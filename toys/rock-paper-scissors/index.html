  <body>
    <div class="bg" aria-hidden="true"></div>

    <main class="stage">
      <p class="result" id="result">Throw a hand</p>

      <div class="arena">
        <div class="hand hand--you"><span class="hand__emoji" id="youHand">✊</span><span class="hand__tag">You</span></div>
        <span class="vs" id="vs">vs</span>
        <div class="hand hand--cpu"><span class="hand__emoji" id="cpuHand">✊</span><span class="hand__tag">CPU</span></div>
      </div>

      <div class="picks" role="group" aria-label="Your move">
        <button type="button" class="pick" data-move="rock" aria-label="Rock"><span>✊</span>Rock</button>
        <button type="button" class="pick" data-move="paper" aria-label="Paper"><span>✋</span>Paper</button>
        <button type="button" class="pick" data-move="scissors" aria-label="Scissors"><span>✌️</span>Scissors</button>
      </div>

      <div class="hud">
        <div class="score"><span class="score__label win">Won</span><span class="score__val" id="sWin">0</span></div>
        <div class="score"><span class="score__label">Tied</span><span class="score__val" id="sTie">0</span></div>
        <div class="score"><span class="score__label loss">Lost</span><span class="score__val" id="sLoss">0</span></div>
        <div class="score"><span class="score__label streak">Streak</span><span class="score__val" id="sStreak">0</span></div>
      </div>
    </main>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 009</span>
      <span class="frame__corner frame__corner--tr">Rock Paper Scissors</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">← onepagetoys.com</a></span>
      <span class="frame__corner frame__corner--br">Best of ∞</span>
    </div>

    <p class="hint" id="hint">pick rock · paper · or scissors</p>
