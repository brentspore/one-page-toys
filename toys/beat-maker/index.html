    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Beat Maker",
        "url": "https://onepagetoys.com/toys/beat-maker/index.html",
        "description": "A step-sequencer music toy: tap a glowing grid to build a looping beat with drums and a pentatonic melody, set the tempo, and randomize.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5. Requires Web Audio.",

  <body>
    <div class="bg" aria-hidden="true"></div>

    <main class="stage">
      <div class="seq" id="seq" aria-label="Step sequencer grid"></div>

      <div class="controls" id="controls">
        <button type="button" class="cbtn cbtn--play" id="playBtn" aria-label="Play">
          <span class="ico-play" aria-hidden="true">▶</span><span class="lbl">Play</span>
        </button>
        <label class="tempo">
          <span class="tempo__k">Tempo</span>
          <input type="range" id="tempo" min="70" max="170" value="110" step="1" aria-label="Tempo (BPM)" />
          <b id="bpm">110</b>
        </label>
        <button type="button" class="cbtn" id="randBtn">Random</button>
        <button type="button" class="cbtn" id="clearBtn">Clear</button>
      </div>
    </main>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 018</span>
      <span class="frame__corner frame__corner--tr">Beat Maker</span>
      <span class="frame__corner frame__corner--bl"><a href="../../index.html">← onepagetoys.com</a></span>
    </div>

    <p class="hint" id="hint">tap the grid to add notes · hit play · every pattern sounds good</p>

    <script src="script.js?v=1" defer></script>
    <script src="../../assets/tip-jar.js?v=9" defer></script>
