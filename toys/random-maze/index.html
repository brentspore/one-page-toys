    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>

  <body>
    <canvas id="canvas"></canvas>

    <div class="hud" id="hud">
      <span class="hud__time" id="time">0:00.0</span>
      <span class="hud__best" id="best">Best —</span>
    </div>

    <button type="button" class="sound-btn" id="soundBtn" aria-pressed="true" title="Toggle sound">♪</button>

    <div class="controls" id="controls">
      <button type="button" class="ctrl" id="diffBtn" title="Change size">Medium</button>
      <button type="button" class="ctrl" id="fogBtn" aria-pressed="false" title="Torch-lit fog">Fog</button>
      <button type="button" class="ctrl" id="newBtn" title="New maze">New maze</button>
    </div>

    <div class="overlay" id="overlay" hidden>
      <div class="panel">
        <h1 class="panel__title" id="ovTitle">Random Maze</h1>
        <p class="panel__text" id="ovText">Guide the spark from the corner to the glowing exit. Use the arrow keys or WASD, swipe, or just tap a spot to path there. A fresh maze every time — beat your best.</p>
        <button type="button" class="play-btn" id="ovBtn">Enter the maze</button>
      </div>
    </div>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 063</span>
      <span class="frame__corner frame__corner--tr">Random Maze</span>
      <span class="frame__corner frame__corner--bl"><a href="../../index.html">&#8592; onepagetoys.com</a></span>
