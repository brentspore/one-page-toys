    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Shuriken Night",
        "url": "https://onepagetoys.com/toys/shuriken-night/",
        "description": "A first-person ninja star throwing game set in a moonlit Japanese castle courtyard. Enemies appear as silhouettes behind lit paper screens before bursting through; throw shuriken, deflect incoming blades in mid-air, charge a fan of three stars, slow time, and clear the screen with ninja magic.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5 Canvas.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=5" />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div class="hud" id="hud" hidden>
      <div class="hud__wave" id="wave" aria-live="polite">Wave 1</div>
      <div class="hud__mark">
        <span class="hud__score" id="score">0</span>
        <span class="hud__seal" aria-hidden="true"></span>
        <span class="hud__best" id="best">Best 0</span>
        <span class="hud__combo" id="combo" hidden></span>
      </div>
      <div class="hud__life" id="life" aria-label="Health"></div>
    </div>

    <div class="abilities" id="abilities" hidden>
      <button type="button" class="ab" id="focusBtn" aria-label="Focus, slow time">
        <span class="ab__glyph">◎</span>
        <span class="ab__label">Focus</span>
        <span class="ab__meter"><i id="focusFill"></i></span>
      </button>
      <button type="button" class="ab ab--magic" id="magicBtn" aria-label="Ninja magic, clear the screen">
        <span class="ab__glyph">卍</span>
        <span class="ab__label">Magic</span>
        <span class="ab__count" id="magicCount">2</span>
      </button>
    </div>

    <button type="button" class="sound-btn" id="soundBtn" aria-pressed="true" title="Toggle sound">♪</button>

    <div class="overlay" id="overlay">
      <div class="panel">
        <p class="panel__eyebrow" id="ovEyebrow">Moonlit courtyard</p>
        <h1 class="panel__title" id="ovTitle">Shuriken Night</h1>
        <p class="panel__text" id="ovText">Shadows are gathering behind the paper screens. Aim, throw, and hold the courtyard until dawn.</p>

        <div class="modes" id="modes">
          <p class="modes__label">Choose your stance</p>
          <div class="modes__row">
            <button type="button" class="mode is-on" id="modeStatic" data-mode="static">
              <span class="mode__name">Hold the line</span>
              <span class="mode__desc">Face one way. Everything comes at you head on.</span>
            </button>
            <button type="button" class="mode" id="modeTurn" data-mode="turn">
              <span class="mode__name">Full circle <b class="mode__badge">Hard</b></span>
              <span class="mode__desc">Turn all the way around. They come from every side.</span>
            </button>
          </div>
        </div>

        <button type="button" class="play-btn" id="ovBtn">Begin the night</button>
        <p class="panel__keys" id="ovKeys"></p>
      </div>
    </div>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 088</span>
      <span class="frame__corner frame__corner--tr">Shuriken Night</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">&#8592; onepagetoys.com</a></span>
    </div>

    <p class="hint" id="hint">swipe to throw · hold to charge</p>

    <script src="../../assets/tickets.js?v=2" defer></script>
    <script src="script.js?v=37" defer></script>
    <script src="../../assets/tip-jar.js?v=10" defer></script>
    <script src="../../assets/share.js?v=5" defer></script>
    <script src="../../assets/fullscreen.js?v=3" defer></script>
    <script src="../../assets/more-games.js?v=9" defer></script>
  </body>
