    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Aurebesh Translator",
        "url": "https://onepagetoys.com/toys/aurebesh-translator/index.html",
        "description": "A live English-to-Aurebesh transliterator styled as a glowing Imperial datapad. Type Galactic Basic and read it back in the Star Wars alphabet; hover any glyph to learn its letter and name.",
        "applicationCategory": "EntertainmentApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>

    <main class="stage">
      <div class="datapad" id="datapad">
        <div class="datapad__header">
          <div class="brand">
            <span class="cog" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6">
                <circle cx="12" cy="12" r="3.4"></circle>
                <path d="M12 2.2v3.2M12 18.6v3.2M2.2 12h3.2M18.6 12h3.2M4.9 4.9l2.3 2.3M16.8 16.8l2.3 2.3M19.1 4.9l-2.3 2.3M7.2 16.8l-2.3 2.3"></path>
              </svg>
            </span>
            <span class="brand__label">Imperial Datapad</span>
          </div>
          <div class="status" aria-hidden="true">
            <span class="status__dots"><i></i><i></i><i></i></span>
            <span class="status__live">● TRANSMITTING</span>
          </div>
        </div>

        <div class="screen" id="screen">
          <div class="screen__glass" aria-hidden="true"></div>
          <div class="screen__scan" aria-hidden="true"></div>
          <div class="screen__inner">
            <p class="screen__tag" aria-hidden="true">GALACTIC BASIC <span class="arrows">»</span> AUREBESH</p>
            <output class="out" id="out" aria-live="polite" aria-label="Aurebesh transliteration"></output>
            <p class="echo" id="echo" aria-hidden="true"></p>
          </div>
          <div class="screen__flicker" aria-hidden="true"></div>
        </div>

        <div class="console">
          <span class="console__prompt" aria-hidden="true">&gt;</span>
          <input
            id="input"
            class="console__input"
            type="text"
            inputmode="text"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            maxlength="120"
            aria-label="Type in English to translate to Aurebesh"
            placeholder="type a message…"
          />
        </div>

        <div class="controls">
          <button type="button" class="ctrl ctrl--send" id="speakBtn">Transmit ►</button>
          <button type="button" class="ctrl" id="voiceBtn">Voice: <b id="voiceName">Letter names</b></button>
          <button type="button" class="ctrl" id="revealBtn" aria-pressed="false">Show letters</button>
          <button type="button" class="ctrl" id="accentBtn">Channel: <b id="accentName">Imperial</b></button>
          <button type="button" class="ctrl" id="soundBtn" aria-pressed="true">Sound ●</button>
          <button type="button" class="ctrl" id="copyBtn">Copy link</button>
        </div>
      </div>
    </main>

    <div class="tip" id="tip" role="status" aria-hidden="true"></div>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 039</span>
      <span class="frame__corner frame__corner--tr">Aurebesh</span>
      <span class="frame__corner frame__corner--bl"><a href="../../index.html">← onepagetoys.com</a></span>
    </div>

    <p class="hint" id="hint">type to translate · hover a glyph to read it</p>

    <script src="script.js?v=3" defer></script>
    <script src="../../assets/tip-jar.js?v=9" defer></script>
    <script src="../../assets/fullscreen.js?v=2" defer></script>
  </body>
