    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Tic-Tac-Toe",
        "url": "https://onepagetoys.com/toys/tic-tac-toe/",
        "description": "Play tic-tac-toe against the computer, with a winnable Chill mode and an unbeatable Ruthless minimax AI.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <div class="bg" aria-hidden="true"></div>

    <main class="stage">
      <p class="status" id="status" aria-live="polite">Your move. You're <span class="x">X</span></p>

      <div class="board" id="board" role="grid" aria-label="Tic-tac-toe board">
        <button class="cell" data-i="0" aria-label="cell 1"></button>
        <button class="cell" data-i="1" aria-label="cell 2"></button>
        <button class="cell" data-i="2" aria-label="cell 3"></button>
        <button class="cell" data-i="3" aria-label="cell 4"></button>
        <button class="cell" data-i="4" aria-label="cell 5"></button>
        <button class="cell" data-i="5" aria-label="cell 6"></button>
        <button class="cell" data-i="6" aria-label="cell 7"></button>
        <button class="cell" data-i="7" aria-label="cell 8"></button>
        <button class="cell" data-i="8" aria-label="cell 9"></button>
        <svg class="winline" id="winline" viewBox="0 0 100 100" aria-hidden="true"><line id="winseg" x1="0" y1="0" x2="0" y2="0" /></svg>
      </div>

      <div class="hud">
        <div class="score"><span class="score__label x">You</span><span class="score__val" id="scoreYou">0</span></div>
        <div class="score"><span class="score__label">Draws</span><span class="score__val" id="scoreDraw">0</span></div>
        <div class="score"><span class="score__label o">CPU</span><span class="score__val" id="scoreCpu">0</span></div>
      </div>

      <div class="controls">
        <div class="seg" role="group" aria-label="Difficulty">
          <button type="button" class="seg__btn is-on" data-diff="chill">Chill</button>
          <button type="button" class="seg__btn" data-diff="ruthless">Ruthless</button>
        </div>
        <button type="button" class="btn btn--primary" id="newBtn">New game</button>
      </div>
    </main>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 008</span>
      <span class="frame__corner frame__corner--tr">Tic-Tac-Toe</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">← onepagetoys.com</a></span>
      <span class="frame__corner frame__corner--br">You're X · CPU is O</span>
    </div>

    <script src="../../assets/tickets.js?v=2" defer></script>
    <script src="script.js?v=3" defer></script>
    <script src="../../assets/tip-jar.js?v=10" defer></script>
    <script src="../../assets/fullscreen.js?v=3" defer></script>
  </body>
