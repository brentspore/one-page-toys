    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>

  <body>
    <canvas id="canvas"></canvas>

    <div class="hud" id="hud">
      <span class="hud__score" id="score">0</span>
      <span class="hud__best" id="best">Best 0</span>
    </div>

    <button type="button" class="round-btn round-btn--new" id="newBtn" title="New game">↻</button>
    <button type="button" class="round-btn sound-btn" id="soundBtn" aria-pressed="true" title="Toggle sound">♪</button>

    <div class="overlay" id="overlay" hidden>
      <div class="panel">
        <h1 class="panel__title" id="ovTitle">Trio</h1>
        <p class="panel__text" id="ovText">Swipe (or use the arrow keys) to nudge every tile one step. A <b>1</b> and a <b>2</b> combine into a <b>3</b>. After that, matching tiles double: 3+3=6, 6+6=12… How big can you go?</p>
        <button type="button" class="play-btn" id="ovBtn">Play</button>
      </div>
    </div>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 062</span>
      <span class="frame__corner frame__corner--tr">Trio</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">&#8592; onepagetoys.com</a></span>
    </div>

    <p class="hint" id="hint">swipe or arrow keys · 1 + 2 = 3, then match to double</p>
