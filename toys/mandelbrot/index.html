    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MultimediaApplication",
        "name": "Mandelbrot",
        "url": "https://onepagetoys.com/toys/mandelbrot/",
        "description": "An interactive Mandelbrot-set fractal explorer with deep, smooth zoom, curated color palettes, a live Julia-set morph mode, and a cinematic auto-journey through curated deep-zoom waypoints.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires WebGL.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=2" />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div class="hud" id="hud" aria-live="polite">
      <span class="hud__stat" id="zoomStat"><span class="hud__ico" aria-hidden="true">⊙</span><span id="zoomVal">×1</span></span>
      <span class="hud__stat hud__stat--seed" id="seedStat" hidden><span class="hud__ico" aria-hidden="true">c</span><span id="seedVal">0</span></span>
    </div>

    <div class="topbtns">
      <button type="button" class="pill" id="paletteBtn" aria-label="Change color palette">Ember</button>
      <button type="button" class="pill" id="modeBtn" aria-pressed="false" aria-label="Switch between Mandelbrot and Julia">Mandelbrot</button>
      <button type="button" class="iconbtn" id="journeyBtn" aria-pressed="false" title="Cinematic auto-journey">▶</button>
      <button type="button" class="iconbtn" id="cycleBtn" aria-pressed="true" title="Toggle color cycling">◍</button>
      <button type="button" class="iconbtn" id="homeBtn" title="Reset view">⌂</button>
      <button type="button" class="iconbtn" id="soundBtn" aria-pressed="true" title="Toggle sound">♪</button>
    </div>

    <div class="overlay" id="overlay">
      <div class="panel">
        <h1 class="panel__title" id="ovTitle">Mandelbrot</h1>
        <p class="panel__text" id="ovText">The Mandelbrot set. Drag to pan, scroll or pinch to dive deeper, and double-tap to zoom in. Switch palettes, morph a live Julia set, or hit Journey and let it fly.</p>
        <button type="button" class="play-btn" id="ovBtn">Explore</button>
      </div>
    </div>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 079</span>
      <span class="frame__corner frame__corner--tr">Mandelbrot</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">&#8592; onepagetoys.com</a></span>
    </div>

    <p class="hint" id="hint">drag to pan · scroll or pinch to zoom · double-tap to dive</p>
