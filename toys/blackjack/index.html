    <script>

          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);

  <body>
    <canvas id="canvas"></canvas>

    <div class="actions" id="actions">
      <button type="button" class="act-btn act-btn--go" id="dealBtn">Deal</button>

      <button type="button" class="act-btn" id="standBtn">Stand</button>
      <button type="button" class="act-btn" id="dblBtn">Double</button>
      <button type="button" class="act-btn" id="splitBtn">Split</button>
      <button type="button" class="act-btn act-btn--go" id="insYesBtn">Insurance</button>
      <button type="button" class="act-btn" id="insNoBtn">No insurance</button>
    </div>

    <div class="overlay" id="overlay" hidden>

        <h1 class="panel__title" id="ovTitle">Out of chips</h1>
        <p class="panel__text" id="ovText">Your stack ran dry.</p>
        <button type="button" class="play-btn" id="ovBtn">New stack ($1,000)</button>
      </div>
    </div>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 055</span>
