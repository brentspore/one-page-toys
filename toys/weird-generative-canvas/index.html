  <body>
    <canvas id="canvas" class="canvas" aria-label="Generative art canvas. Drag to steer."></canvas>

    <div class="panel" id="panel">
      <div class="row">
        <div class="seg" role="group" aria-label="Mode" id="modes">
          <button type="button" class="seg__btn is-on" data-mode="flow">Flow</button>
          <button type="button" class="seg__btn" data-mode="harmono">Harmonograph</button>
          <button type="button" class="seg__btn" data-mode="swarm">Swarm</button>
          <button type="button" class="seg__btn" data-mode="kaleido">Kaleidoscope</button>
        </div>
      </div>
      <div class="row">
        <div class="swatches" id="palettes" role="group" aria-label="Palette"></div>
        <label class="slider"><span>Speed</span><input type="range" id="speed" min="1" max="10" value="5" /></label>
        <label class="slider"><span>Density</span><input type="range" id="density" min="1" max="10" value="5" /></label>
        <div class="btns">
          <button type="button" class="cbtn" id="randomBtn">Randomize</button>
          <button type="button" class="cbtn" id="clearBtn">Clear</button>
          <button type="button" class="cbtn cbtn--accent" id="saveBtn">Save PNG</button>
        </div>
      </div>
    </div>

    <div class="frame">
      <span class="frame__corner frame__corner--tl"><a href="../../index.html">← onepagetoys.com</a></span>
      <span class="frame__corner frame__corner--tr">No. 013 · Generative Canvas</span>
    </div>

    <p class="hint" id="hint">drag on the canvas to steer · switch modes below</p>
