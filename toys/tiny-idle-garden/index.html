  <body>
    <canvas id="garden" class="garden" aria-label="A tiny garden. Tap the soil to plant a seed; tap a plant to water it."></canvas>

    <div class="controls" id="controls">
      <span class="dew" id="dew" title="Dew — your garden's currency">
        <span class="dew__drop" aria-hidden="true"></span>
        <span class="dew__amt" id="dewAmt">0</span>
        <span class="dew__rate" id="dewRate">+0/min</span>
      </span>
      <button type="button" class="cbtn cbtn--primary" id="plantBtn">
        <span aria-hidden="true">🌱</span><span class="cbtn__label" id="plantLabel">Plant</span><span class="cbtn__cost" id="plantCost">8</span>
      </button>
      <button type="button" class="cbtn" id="soilBtn">
        <span aria-hidden="true">🌿</span><span class="cbtn__label">Tend soil</span><span class="cbtn__cost" id="soilCost">40</span>
      </button>
      <button type="button" class="cbtn" id="rainBtn">
        <span aria-hidden="true">🌧️</span><span class="cbtn__label" id="rainLabel">Rain</span>
      </button>
    </div>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 015</span>
      <span class="frame__corner frame__corner--tr">Tiny Idle Garden</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">← onepagetoys.com</a></span>
    </div>

    <p class="hint" id="hint">tap the soil to plant · tap a plant to water it · it grows while you're away</p>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
