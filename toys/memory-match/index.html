        "@context": "https://schema.org",

  <body>
    <div class="bg" aria-hidden="true"></div>

    <main class="stage">
      <div class="hud">
        <div class="stat"><span class="stat__label">Pairs</span><span class="stat__val" id="pairs">0/0</span></div>
        <div class="stat"><span class="stat__label">Moves</span><span class="stat__val" id="moves">0</span></div>
        <div class="stat"><span class="stat__label">Time</span><span class="stat__val" id="time">0:00</span></div>
      </div>

      <p class="status" id="status">Find every pair.</p>

      <div class="grid" id="grid" data-size="m"></div>

      <div class="controls">
        <div class="seg" role="group" aria-label="Grid size">
          <button type="button" class="seg__btn" data-size="s">Easy</button>
          <button type="button" class="seg__btn is-on" data-size="m">Medium</button>
          <button type="button" class="seg__btn" data-size="l">Hard</button>
        </div>
        <button type="button" class="btn btn--primary" id="newBtn">New game</button>
      </div>
    </main>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 011</span>
      <span class="frame__corner frame__corner--tr">Memory Match</span>
      <span class="frame__corner frame__corner--bl"><a href="../../index.html">← onepagetoys.com</a></span>
      <span class="frame__corner frame__corner--br">Flip · match · clear</span>
    </div>
