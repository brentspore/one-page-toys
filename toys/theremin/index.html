    <script type="application/ld+json">
      {
        "@context": "https://schema.org",

        "name": "Theremin",

        "description": "A browser theremin. Glide across the field to control pitch (left-right) and volume (up-down) with eerie vibrato.",

    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>

      <button type="button" class="ctrl-btn" id="soundBtn" aria-pressed="true">Sound: on</button>

    <div class="frame" aria-hidden="true">
