    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Solitaire",
        "url": "https://onepagetoys.com/toys/solitaire/",
        "description": "Play classic Klondike Solitaire in your browser — deal, build the four foundations by suit, and clear the board for the win cascade.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5 Canvas.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=4" />

  <body>
    <canvas id="canvas"></canvas>

    <div class="controls" id="controls">
      <span class="stat-chip" id="statChip">MOVES 0 · 0:00</span>
      <button type="button" class="ctrl-btn" id="newBtn">New game</button>
      <button type="button" class="ctrl-btn" id="undoBtn">Undo</button>
      <button type="button" class="ctrl-btn" id="drawBtn" aria-pressed="true">Draw 3</button>
      <button type="button" class="ctrl-btn" id="soundBtn" aria-pressed="true">Sound: on</button>
    </div>

    <div class="overlay" id="overlay" hidden>
      <div class="panel">
        <h1 class="panel__title" id="ovTitle">You win!</h1>
        <p class="panel__text" id="ovText">Cleared the board.</p>
        <button type="button" class="play-btn" id="ovBtn">New game</button>
      </div>
    </div>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 054</span>
      <span class="frame__corner frame__corner--tr">Solitaire</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">&#8592; onepagetoys.com</a></span>
    </div>

    <p class="hint" id="hint">drag to build down in alternating colors &mdash; double-click to send home</p>
