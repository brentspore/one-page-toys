  <body>
    <canvas id="canvas"></canvas>

    <div class="controls" id="controls">
      <button type="button" class="ctrl-btn ctrl-btn--play" id="playBtn" aria-pressed="false"><span class="lbl">Play</span></button>
      <div class="ctrl-tempo">
        <button type="button" class="ctrl-step" id="tempoDown" aria-label="Slower">−</button>
        <span class="ctrl-bpm"><b id="bpm">96</b> bpm</span>
        <button type="button" class="ctrl-step" id="tempoUp" aria-label="Faster">+</button>
      </div>
      <button type="button" class="ctrl-btn" id="scaleBtn">Major</button>
      <button type="button" class="ctrl-btn" id="randBtn">Shuffle</button>
      <button type="button" class="ctrl-btn" id="clearBtn">Clear</button>
      <button type="button" class="ctrl-btn" id="soundBtn" aria-pressed="false">Sound: on</button>
    </div>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 070</span>
      <span class="frame__corner frame__corner--tr">Marble Machine</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">&#8592; onepagetoys.com</a></span>

    <p class="hint">tap the grid to place pegs, press play, drag the wood to swivel</p>
