    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Coin Flip",
        "url": "https://onepagetoys.com/toys/coin-flipper/",
        "description": "Toss a real 3D gold coin: it arcs, tumbles, and lands on heads or tails with cryptographically fair odds.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>

  <body>
    <div class="spot" aria-hidden="true"></div>

    <main class="stage">
      <p class="result" id="result" aria-live="polite">Flip to start</p>

      <div class="arena">
        <button type="button" class="coin-stage" id="coinStage" aria-label="Flip coin">
          <div class="coin" id="coin"></div>
        </button>
        <div class="coin-shadow" id="shadow" aria-hidden="true"></div>
      </div>

      <div class="hud">
        <div class="stat"><span class="stat__label">Heads</span><span class="stat__value" id="sHeads">0</span></div>
        <div class="stat"><span class="stat__label">Tails</span><span class="stat__value" id="sTails">0</span></div>
        <div class="stat"><span class="stat__label">Streak</span><span class="stat__value" id="sStreak">0</span></div>
        <div class="stat"><span class="stat__label">Flips</span><span class="stat__value" id="sTotal">0</span></div>
      </div>

      <div class="ratio" aria-hidden="true">
        <div class="ratio__fill" id="ratioFill" style="width:50%"></div>
        <span class="ratio__mid"></span>
      </div>
      <ol class="history" id="history" aria-label="Recent flips"></ol>

      <div class="actions">
        <button type="button" class="btn btn--primary" id="flipBtn">Flip</button>
        <button type="button" class="btn btn--ghost" id="resetBtn">Reset</button>
        <button type="button" class="btn btn--ghost" id="soundBtn" aria-pressed="true">Sound on</button>
      </div>
    </main>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 004</span>
      <span class="frame__corner frame__corner--tr">Coin Flip</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">← onepagetoys.com</a></span>
      <span class="frame__corner frame__corner--br">Cryptographically fair</span>
    </div>

    <p class="hint" id="hint">tap the coin · or press space</p>

    <script src="../../assets/tickets.js?v=12" defer></script>
    <script src="../../assets/prizes.js?v=1" defer></script>
    <script src="script.js?v=2" defer></script>
    <script src="../../assets/tip-jar.js?v=10" defer></script>
    <script src="../../assets/fullscreen.js?v=3" defer></script>
  </body>
