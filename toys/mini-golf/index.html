    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Mini Golf",
        "url": "https://onepagetoys.com/toys/mini-golf/",
        "description": "An 18-hole putt-putt. Drag to aim and set power, bank off walls and bumpers, and sink the ball across the course to an epic par-5 finale.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5 Canvas.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=5" />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div class="hud" id="hud">
      <span class="hud__pill" id="holePill">Hole 1</span>
      <span class="hud__pill" id="strokePill">Strokes 0</span>
      <span class="hud__pill" id="parPill">Par 3</span>
      <span class="hud__pill" id="scorePill">Total –</span>
    </div>

    <button type="button" class="sound-btn" id="soundBtn" aria-pressed="true" title="Toggle sound">♪</button>

    <div class="toast" id="toast" hidden></div>

    <!-- designed hole / daily-course intro placard (populated by script.js) -->
    <div class="holecard" id="holeCard" aria-hidden="true"></div>

    <div class="frame" aria-hidden="true">
      <span class="frame__corner frame__corner--tl">No. 057</span>
      <span class="frame__corner frame__corner--tr">Mini Golf</span>
      <span class="frame__corner frame__corner--bl"><a href="../../">&#8592; onepagetoys.com</a></span>
    </div>

    <p class="hint" id="hint">drag back from the ball to aim &amp; set power, then release to putt</p>

    <!-- Course-complete scorecard (after 18 holes). More Games + Share auto-mount here. -->
    <div class="overlay is-hidden" id="overlay" hidden>
      <div class="panel">
        <h1 class="panel__title" id="ovTitle">Clubhouse!</h1>
        <p class="panel__text" id="ovText"></p>
        <button type="button" class="play-btn" id="ovBtn">Play again</button>
        <p class="panel__best" id="ovBest"></p>
      </div>
    </div>

    <script src="script.js?v=11" defer></script>
    <script src="../../assets/tip-jar.js?v=10" defer></script>
    <script src="../../assets/fullscreen.js?v=3" defer></script>
    <script src="../../assets/more-games.js?v=6" defer></script>
    <script src="../../assets/share.js?v=5" defer></script>
  </body>
</html>
