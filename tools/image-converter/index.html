<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quick Image Converter</title>
    <meta name="description" content="Drag and drop an image and convert to PNG, JPEG, or WebP in the browser." />
    <link rel="stylesheet" href="../../assets/styles.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand" href="../../index.html">One Page Toys</a>
      </div>
    </header>

    <main class="container">
      <section class="tool">
        <h1 class="icv-title">Quick Image Converter</h1>
        <p class="lead icv-lead muted">
          Drag in an image or browse (max <strong id="icvMaxSizeLabel">20 MB</strong> per file). Everything runs in your browser—nothing is uploaded.
        </p>

        <div id="icvError" class="icv-error icv-hidden" role="alert"></div>

        <div class="panel icv-panel">
          <input id="icvFile" type="file" class="icv-file-input" accept="image/*" />

          <button type="button" class="icv-dropzone" id="icvDropzone" aria-label="Upload image">
            <span class="icv-dropzone-main">Drop an image here</span>
            <span class="icv-dropzone-sub muted"
              >or click to choose · PNG, JPEG, GIF, WebP, … · max <span id="icvMaxSizeDrop">20 MB</span></span>
          </button>

          <div id="icvPreviewWrap" class="icv-preview-wrap icv-hidden">
            <div class="icv-preview-head">
              <div>
                <div id="icvFileName" class="icv-file-name"></div>
                <div id="icvFileMeta" class="icv-file-meta muted"></div>
              </div>
              <button type="button" class="btn" id="icvClear">Clear</button>
            </div>
            <div class="icv-preview-row">
              <img id="icvThumb" class="icv-thumb" alt="Preview" />
            </div>

            <div class="icv-controls">
              <div class="icv-field">
                <label for="icvFormat" class="icv-label">Output format</label>
                <select id="icvFormat" class="icv-select">
                  <option value="image/png">PNG</option>
                  <option value="image/jpeg" selected>JPEG</option>
                  <option value="image/webp" id="icvOptWebp">WebP</option>
                </select>
              </div>
              <div class="icv-field icv-field-grow" id="icvQualityWrap">
                <label for="icvQuality" class="icv-label">
                  Quality <span id="icvQualityVal" class="muted">0.92</span>
                </label>
                <input id="icvQuality" class="icv-range" type="range" min="0.5" max="1" step="0.01" value="0.92" />
              </div>
            </div>

            <div class="icv-actions">
              <button type="button" class="btn btn--primary" id="icvConvert">Convert &amp; download</button>
            </div>
            <p id="icvHint" class="icv-hint muted"></p>
          </div>
        </div>
      </section>

      <footer class="footer">
        <p class="muted">
          <a href="../../index.html">Back to gallery</a>
        </p>
      </footer>
    </main>

    <script>
      (function () {
        /** Max input file size (bytes). Keeps huge images from freezing the tab. */
        var MAX_FILE_BYTES = 20 * 1024 * 1024;

        var elError = document.getElementById("icvError");
        var elMaxSizeLabel = document.getElementById("icvMaxSizeLabel");
        var elMaxSizeDrop = document.getElementById("icvMaxSizeDrop");
        var elFile = document.getElementById("icvFile");
        var elDrop = document.getElementById("icvDropzone");
        var elPreviewWrap = document.getElementById("icvPreviewWrap");
        var elFileName = document.getElementById("icvFileName");
        var elFileMeta = document.getElementById("icvFileMeta");
        var elThumb = document.getElementById("icvThumb");
        var elClear = document.getElementById("icvClear");
        var elFormat = document.getElementById("icvFormat");
        var elOptWebp = document.getElementById("icvOptWebp");
        var elQualityWrap = document.getElementById("icvQualityWrap");
        var elQuality = document.getElementById("icvQuality");
        var elQualityVal = document.getElementById("icvQualityVal");
        var elConvert = document.getElementById("icvConvert");
        var elHint = document.getElementById("icvHint");

        var currentFile = null;
        var currentObjectUrl = null;
        var loadedImage = null;

        function formatBytesShort(n) {
          if (!n && n !== 0) return "";
          if (n < 1024) return n + " B";
          if (n < 1024 * 1024) return Math.round(n / 1024) + " KB";
          var mb = n / (1024 * 1024);
          return (Math.round(mb * 10) / 10) + " MB";
        }

        var maxLabelText = formatBytesShort(MAX_FILE_BYTES);
        if (elMaxSizeLabel) elMaxSizeLabel.textContent = maxLabelText;
        if (elMaxSizeDrop) elMaxSizeDrop.textContent = maxLabelText;

        function showError(msg) {
          if (!msg) {
            elError.classList.add("icv-hidden");
            elError.textContent = "";
            return;
          }
          elError.textContent = msg;
          elError.classList.remove("icv-hidden");
        }

        function revokeCurrentUrl() {
          if (currentObjectUrl) {
            URL.revokeObjectURL(currentObjectUrl);
            currentObjectUrl = null;
          }
        }

        function formatBytes(n) {
          if (!n && n !== 0) return "";
          if (n < 1024) return n + " B";
          if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
          return (n / (1024 * 1024)).toFixed(2) + " MB";
        }

        function extForMime(mime) {
          if (mime === "image/png") return "png";
          if (mime === "image/jpeg") return "jpg";
          if (mime === "image/webp") return "webp";
          return "bin";
        }

        function baseName(name) {
          var i = name.lastIndexOf(".");
          return i > 0 ? name.slice(0, i) : name;
        }

        function canvasSupportsMime(mime) {
          try {
            var c = document.createElement("canvas");
            c.width = c.height = 1;
            var d = c.toDataURL(mime);
            if (mime === "image/webp") return d.indexOf("webp") !== -1;
            return d.indexOf("data:" + mime) === 0 || d.length > 6;
          } catch (e) {
            return false;
          }
        }

        function toggleQualityVisibility() {
          var mime = elFormat.value;
          var lossy = mime === "image/jpeg" || mime === "image/webp";
          elQualityWrap.style.display = lossy ? "" : "none";
        }

        function loadImageFromFile(file) {
          return new Promise(function (resolve, reject) {
            revokeCurrentUrl();
            currentObjectUrl = URL.createObjectURL(file);
            var img = new Image();
            img.onload = function () {
              resolve(img);
            };
            img.onerror = function () {
              reject(new Error("Could not read this image. Try another file."));
            };
            img.src = currentObjectUrl;
          });
        }

        function setFile(file) {
          if (!file || !file.type || file.type.indexOf("image/") !== 0) {
            showError("Please choose an image file.");
            return;
          }
          if (typeof file.size === "number" && file.size > MAX_FILE_BYTES) {
            showError(
              "This file is too large (" +
                formatBytes(file.size) +
                "). Max size is " +
                formatBytesShort(MAX_FILE_BYTES) +
                "."
            );
            return;
          }
          currentFile = file;
          showError("");
          elFileName.textContent = file.name;
          elFileMeta.textContent = formatBytes(file.size) + " · loading…";
          elPreviewWrap.classList.remove("icv-hidden");
          elThumb.removeAttribute("src");

          loadImageFromFile(file)
            .then(function (img) {
              loadedImage = img;
              elThumb.src = currentObjectUrl;
              elFileMeta.textContent =
                formatBytes(file.size) +
                " · " +
                img.naturalWidth +
                " × " +
                img.naturalHeight +
                " px";
              elHint.textContent =
                elFormat.value === "image/jpeg" || elFormat.value === "image/webp"
                  ? "JPEG/WebP use a white background where the source was transparent."
                  : "";
            })
            .catch(function (e) {
              loadedImage = null;
              showError((e && e.message) || "Failed to load image.");
              elPreviewWrap.classList.add("icv-hidden");
            });
        }

        function clearAll() {
          currentFile = null;
          loadedImage = null;
          elFile.value = "";
          elThumb.removeAttribute("src");
          revokeCurrentUrl();
          elPreviewWrap.classList.add("icv-hidden");
          showError("");
          elHint.textContent = "";
        }

        function convertAndDownload() {
          if (!loadedImage || !currentFile) {
            showError("Add an image first.");
            return;
          }

          var mime = elFormat.value;
          var quality = parseFloat(elQuality.value);
          if (!canvasSupportsMime(mime)) {
            showError("This browser cannot encode " + mime.replace("image/", "").toUpperCase() + ". Try PNG or JPEG.");
            return;
          }

          var w = loadedImage.naturalWidth;
          var h = loadedImage.naturalHeight;
          if (!w || !h) {
            showError("Image has no dimensions.");
            return;
          }

          var canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          var ctx = canvas.getContext("2d");
          if (!ctx) {
            showError("Canvas is not available.");
            return;
          }

          if (mime === "image/jpeg" || mime === "image/webp") {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, w, h);
          }
          ctx.drawImage(loadedImage, 0, 0);

          showError("");

          canvas.toBlob(
            function (blob) {
              if (!blob) {
                showError("Encoding failed. Try a different format.");
                return;
              }
              var ext = extForMime(mime);
              var outName = baseName(currentFile.name) + "." + ext;
              var url = URL.createObjectURL(blob);
              var a = document.createElement("a");
              a.href = url;
              a.download = outName;
              a.rel = "noopener";
              document.body.appendChild(a);
              a.click();
              a.remove();
              setTimeout(function () {
                URL.revokeObjectURL(url);
              }, 4000);
              elHint.textContent = "Saved as " + outName + " (" + formatBytes(blob.size) + ").";
            },
            mime,
            mime === "image/png" ? undefined : quality
          );
        }

        if (!canvasSupportsMime("image/webp")) {
          elOptWebp.disabled = true;
          elOptWebp.textContent = "WebP (not supported here)";
        }

        elDrop.addEventListener("click", function () {
          elFile.click();
        });

        elFile.addEventListener("change", function () {
          var f = elFile.files && elFile.files[0];
          if (f) setFile(f);
        });

        ["dragenter", "dragover"].forEach(function (ev) {
          elDrop.addEventListener(ev, function (e) {
            e.preventDefault();
            e.stopPropagation();
            elDrop.classList.add("icv-dropzone--active");
          });
        });

        ["dragleave", "drop"].forEach(function (ev) {
          elDrop.addEventListener(ev, function (e) {
            e.preventDefault();
            e.stopPropagation();
            elDrop.classList.remove("icv-dropzone--active");
          });
        });

        elDrop.addEventListener("drop", function (e) {
          var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
          if (f) {
            elFile.value = "";
            setFile(f);
          }
        });

        elClear.addEventListener("click", clearAll);

        elFormat.addEventListener("change", function () {
          toggleQualityVisibility();
          if (loadedImage && currentFile) {
            elHint.textContent =
              elFormat.value === "image/jpeg" || elFormat.value === "image/webp"
                ? "JPEG/WebP use a white background where the source was transparent."
                : "";
          }
        });

        elQuality.addEventListener("input", function () {
          elQualityVal.textContent = parseFloat(elQuality.value).toFixed(2);
        });

        elConvert.addEventListener("click", convertAndDownload);

        toggleQualityVisibility();
        elQualityVal.textContent = parseFloat(elQuality.value).toFixed(2);
      })();
    </script>
  </body>
</html>
