    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Meeting Cost Meter",
        "url": "https://onepagetoys.com/tools/meeting-cost-meter/",
        "description": "A live money meter for meetings. Set the hourly rate and headcount, hit start, and watch the cost climb in real time.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var de = document.documentElement;
          de.setAttribute("data-theme", dark ? "dark" : "light");
          de.setAttribute("data-theme-mode", m);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=5" />
  </head>
  <body>
    <canvas class="embers" id="embers" aria-hidden="true"></canvas>
    <div class="heat" id="heat" aria-hidden="true"></div>

    <header class="topbar" aria-label="One Page Toys">
      <a class="brand" href="../../">
        <span class="brand__mark" aria-hidden="true"></span>
        <span>One Page Toys</span>
      </a>
      <div class="topbar__right">
        <span class="topbar__tag">No. 002 · Meeting Cost Meter</span>
        <button type="button" class="iconbtn theme-toggle" data-theme-toggle aria-label="Theme: System (click to change)" title="Theme: System">
          <span class="theme-toggle__auto" aria-hidden="true">◐</span>
          <span class="theme-toggle__sun" aria-hidden="true">☀</span>
          <span class="theme-toggle__moon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>

    <main class="stage">
      <section class="meter" aria-label="Meeting cost meter">
        <input
          id="title"
          class="meter__title"
          value="Untitled meeting"
          spellcheck="false"
          autocomplete="off"
          aria-label="Meeting title"
          maxlength="48"
        />

        <p class="meter__eyebrow">Total cost so far</p>
        <div class="odo" id="odo" role="text" aria-label="$0.00">$0.00</div>
        <p id="compare" class="meter__compare">Set the room, then light the fuse.</p>

        <div class="console">
          <div class="controls">
            <div class="field">
              <label class="field__label" for="rate">$ / hour · per person</label>
              <div class="field__box">
                <button type="button" class="step" data-step="rate" data-dir="-1" aria-label="Lower rate">–</button>
                <input id="rate" class="field__input" type="number" inputmode="decimal" min="0" step="5" value="100" />
                <button type="button" class="step" data-step="rate" data-dir="1" aria-label="Raise rate">+</button>
              </div>
            </div>

            <div class="field">
              <label class="field__label" for="people">People in the room</label>
              <div class="field__box">
                <button type="button" class="step" data-step="people" data-dir="-1" aria-label="Fewer people">–</button>
                <input id="people" class="field__input" type="number" inputmode="numeric" min="1" step="1" value="6" />
                <button type="button" class="step" data-step="people" data-dir="1" aria-label="More people">+</button>
              </div>
            </div>
          </div>

          <div class="presets" role="group" aria-label="Quick rates">
            <button type="button" class="preset" data-rate="75">$75</button>
            <button type="button" class="preset" data-rate="100">$100</button>
            <button type="button" class="preset" data-rate="150">$150</button>
            <button type="button" class="preset" data-rate="250">$250</button>
          </div>

          <div class="actions">
            <button id="toggle" class="btn btn--primary" type="button">Light the fuse</button>
            <button id="reset" class="btn btn--ghost" type="button">Reset</button>
          </div>

          <div class="stats">
            <div class="stat">
              <span class="stat__label">Elapsed</span>
              <span id="elapsed" class="stat__value">00:00:00</span>
            </div>
            <div class="stat">
              <span class="stat__label">Burn / min</span>
              <span id="perMin" class="stat__value">$0.00</span>
            </div>
            <div class="stat">
              <span class="stat__label">Burn / sec</span>
              <span id="perSec" class="stat__value">$0.00</span>
            </div>
          </div>

          <p id="status" class="meter__status" aria-live="polite">Ready when you are.</p>
        </div>
      </section>

      <a class="backlink" href="../../">← onepagetoys.com</a>
    </main>

    <script src="../../assets/tickets.js?v=8" defer></script>
    <script src="../../assets/prizes.js?v=1" defer></script>
    <script src="script.js?v=4" defer></script>
    <script src="../../assets/theme.js?v=8" defer></script>
    <script src="../../assets/tip-jar.js?v=10" defer></script>
    <script src="../../assets/fullscreen.js?v=3" defer></script>
  </body>
</html>
