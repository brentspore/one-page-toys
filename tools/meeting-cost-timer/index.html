<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meeting Cost Timer</title>
    <meta name="description" content="Enter $/hour and people; watch the cost rise live." />
    <link rel="stylesheet" href="../../assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand" href="../../index.html">One Page Toys</a>
      </div>
    </header>

    <main class="container">
      <section class="tool">
        <h1>Meeting Cost Timer</h1>
        <p class="lead">Enter an average cost per hour and number of people, then watch the total cost grow.</p>
        <div class="panel" style="display: grid; grid-template-columns: 1fr; gap: 16px;">
          <!-- HERO COST DISPLAY -->
          <div style="padding: 22px 18px 20px; border: 1px solid var(--border); border-radius: 22px; background: rgba(255,255,255,0.9); text-align: center;">
              <div style="margin-bottom: 16px;">
                <div class="muted" style="font-weight: 800; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px;">
                  Total cost so far
                </div>
                <div
                  id="totalCostText"
                  style="font-size: clamp(52px, 12vw, 92px); font-weight: 900; letter-spacing: -0.06em; line-height: 1.02;"
                >
                  $0.00
                </div>
              </div>

              <div style="display: flex; flex-wrap: wrap; gap: 18px; justify-content: center; align-items: baseline;">
                <div>
                  <div class="muted" style="font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;">
                    Elapsed
                  </div>
                  <div
                    id="elapsedText"
                    style="font-size: clamp(20px, 4vw, 30px); font-weight: 800; letter-spacing: 0.02em; line-height: 1.1;"
                  >
                    00:00:00
                  </div>
                </div>

                <div style="display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;">
                  <div>
                    <div class="muted" style="font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;">
                      / second
                    </div>
                    <div id="ratePerSecondText" style="font-weight: 800; font-size: 18px;">$0.00</div>
                  </div>
                  <div>
                    <div class="muted" style="font-weight: 800; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;">
                      / minute
                    </div>
                    <div id="ratePerMinuteText" style="font-weight: 800; font-size: 18px;">$0.00</div>
                  </div>
                </div>
              </div>

              <p class="muted" style="margin: 14px 0 0; font-size: 12px;">
                The meter starts when you press Start and pauses whenever you need a breather.
              </p>
            </div>

            <!-- SETTINGS BELOW HERO -->
            <div style="display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; border-top: 1px solid var(--border); padding-top: 14px; margin-top: 4px;">
              <div style="grid-column: span 12;">
                <label for="meetingTitle" class="muted" style="font-weight: 800; font-size: 13px; display: block; margin-bottom: 8px;">
                  Meeting title (optional)
                </label>
                <input
                  id="meetingTitle"
                  type="text"
                  placeholder="e.g., Weekly Sync"
                  style="width: 100%; box-sizing: border-box; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 15px;"
                />
              </div>

              <div style="grid-column: span 6;">
                <label for="hourlyRate" class="muted" style="font-weight: 800; font-size: 13px; display: block; margin-bottom: 8px;">
                  Avg $ per hour (per person)
                </label>
                <input
                  id="hourlyRate"
                  type="number"
                  min="0"
                  step="0.01"
                  inputmode="decimal"
                  value="100"
                  style="width: 100%; box-sizing: border-box; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 15px;"
                />
              </div>

              <div style="grid-column: span 6;">
                <label for="peopleCount" class="muted" style="font-weight: 800; font-size: 13px; display: block; margin-bottom: 8px;">
                  People
                </label>
                <input
                  id="peopleCount"
                  type="number"
                  min="1"
                  step="1"
                  inputmode="numeric"
                  value="6"
                  style="width: 100%; box-sizing: border-box; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 15px;"
                />
              </div>

              <div style="grid-column: span 12;">
                <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: flex-start;">
                  <button id="startBtn" class="btn btn--primary" type="button">Start</button>
                  <button id="pauseBtn" class="btn" type="button" disabled>Pause</button>
                  <button id="resetBtn" class="btn" type="button">Reset</button>
                  <div id="statusMsg" class="muted" aria-live="polite" style="font-weight: 800; font-size: 13px;"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <footer class="footer">
        <p class="muted">
          <a href="../../index.html">Back to gallery</a>
        </p>
      </footer>
    </main>

    <script>
      const hourlyRateEl = document.getElementById("hourlyRate");
      const peopleCountEl = document.getElementById("peopleCount");
      const startBtn = document.getElementById("startBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const resetBtn = document.getElementById("resetBtn");
      const statusMsgEl = document.getElementById("statusMsg");

      const elapsedTextEl = document.getElementById("elapsedText");
      const totalCostTextEl = document.getElementById("totalCostText");
      const ratePerSecondTextEl = document.getElementById("ratePerSecondText");
      const ratePerMinuteTextEl = document.getElementById("ratePerMinuteText");

      let running = false;
      let elapsedMs = 0;
      let startPerfMs = 0; // performance.now() at start/resume
      let intervalId = null;

      function clampNumber(n) {
        const x = Number(n);
        return Number.isFinite(x) ? x : 0;
      }

      function getInputs() {
        const hourlyRate = clampNumber(hourlyRateEl.value);
        const people = Math.max(0, Math.floor(clampNumber(peopleCountEl.value)));
        return { hourlyRate, people };
      }

      function formatMoney(amount) {
        const v = Number(amount);
        if (!Number.isFinite(v)) return "$0.00";
        return "$" + v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function formatElapsed(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const hh = String(Math.floor(totalSeconds / 3600)).padStart(2, "0");
        const mm = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, "0");
        const ss = String(totalSeconds % 60).padStart(2, "0");
        return `${hh}:${mm}:${ss}`;
      }

      function computeCostRate() {
        const { hourlyRate, people } = getInputs();
        // Interpret $/hour as per-person cost. Total hourly cost = hourlyRate * people.
        const totalPerSecond = (hourlyRate * people) / 3600;
        const totalPerMinute = totalPerSecond * 60;
        const totalPerMs = totalPerSecond / 1000;
        return { totalPerSecond, totalPerMinute, totalPerMs };
      }

      function updateUI() {
        const { totalPerSecond, totalPerMinute, totalPerMs } = computeCostRate();

        elapsedTextEl.textContent = formatElapsed(elapsedMs);
        totalCostTextEl.textContent = formatMoney(totalPerMs * elapsedMs);
        ratePerSecondTextEl.textContent = formatMoney(totalPerSecond);
        ratePerMinuteTextEl.textContent = formatMoney(totalPerMinute);
      }

      function setRunning(nextRunning) {
        running = nextRunning;
        startBtn.disabled = running;
        pauseBtn.disabled = !running;

        if (!running) {
          statusMsgEl.textContent = elapsedMs > 0 ? "Paused" : "Ready";
        } else {
          statusMsgEl.textContent = "Running…";
        }
      }

      function startTimer() {
        const { hourlyRate, people } = getInputs();
        if (hourlyRate < 0) {
          statusMsgEl.textContent = "Hourly rate must be >= 0";
          return;
        }
        if (people <= 0) {
          statusMsgEl.textContent = "People must be at least 1";
          return;
        }

        setRunning(true);
        startPerfMs = performance.now() - elapsedMs;

        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(() => {
          elapsedMs = performance.now() - startPerfMs;
          updateUI();
        }, 100);
      }

      function pauseTimer() {
        if (!running) return;
        elapsedMs = performance.now() - startPerfMs;
        setRunning(false);
        if (intervalId) clearInterval(intervalId);
        intervalId = null;
        updateUI();
      }

      function resetTimer() {
        setRunning(false);
        elapsedMs = 0;
        if (intervalId) clearInterval(intervalId);
        intervalId = null;
        statusMsgEl.textContent = "Reset";
        updateUI();
      }

      startBtn.addEventListener("click", startTimer);
      pauseBtn.addEventListener("click", pauseTimer);
      resetBtn.addEventListener("click", resetTimer);

      // Recompute rates live as inputs change (even while paused).
      [hourlyRateEl, peopleCountEl].forEach((el) => {
        el.addEventListener("input", () => {
          if (!running) {
            statusMsgEl.textContent = elapsedMs > 0 ? "Paused (inputs updated)" : "Ready";
            updateUI();
          }
        });
      });

      // Initial render.
      updateUI();
      setRunning(false);
    </script>
  </body>
</html>
