        <div class="panel">
          <div class="odd-panel">
            <p class="odd-meta" id="oddScore" aria-live="polite">Score: 0 — Tap the odd emoji.</p>

    <script>
      (function () {
        var POOL = ["🐸", "🦊", "🐙", "🦄", "🐧", "🦉", "🍄", "🌵", "🎸", "🛸", "🧲", "🎪", "🍉", "🥑", "🧊", "🔮"];
        var grid = document.getElementById("oddGrid");
        var scoreEl = document.getElementById("oddScore");
        var score = 0;
        var oddIndex = 0;
        var locked = false;

        function rand(n) {
          var a = new Uint32Array(1);
          try {
            crypto.getRandomValues(a);
          } catch (e) {
            a[0] = Math.floor(Math.random() * 0xffffffff);
          }
          return a[0] % n;
        }

        function shuffle(arr) {
          for (var i = arr.length - 1; i > 0; i--) {
            var j = rand(i + 1);
            var t = arr[i];
            arr[i] = arr[j];
            arr[j] = t;
          }
          return arr;
        }

        function round() {
          locked = false;
          scoreEl.textContent = "Score: " + score + " — Tap the odd emoji.";
          grid.innerHTML = "";
          var i = rand(POOL.length);
          var j = i;
          while (j === i) j = rand(POOL.length);
          var common = POOL[i];
          var odd = POOL[j];
          var em = [common, common, common, odd];
          shuffle(em);
          oddIndex = em.indexOf(odd);
          for (var k = 0; k < 4; k++) {
            var b = document.createElement("button");
            b.type = "button";
            b.className = "odd-cell";
            b.textContent = em[k];
            b.setAttribute("aria-label", "Choice " + (k + 1));
            (function (idx) {
              b.addEventListener("click", function () {
                if (locked) return;
                if (idx === oddIndex) {
                  locked = true;
                  score++;
                  scoreEl.textContent = "Score: " + score + " — Nice catch.";
                  this.classList.add("odd-cell--right");
                } else {
                  this.classList.add("odd-cell--wrong");
                  setTimeout(
                    function (el) {
                      el.classList.remove("odd-cell--wrong");
                    },
                    400,
                    this
                  );
                }
              });
            })(k);
            grid.appendChild(b);
          }
        }

        document.getElementById("oddNext").addEventListener("click", round);
        round();
      })();
    </script>
