    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Countdown to Anything",
        "url": "https://onepagetoys.com/tools/countdown/index.html",
        "description": "Name any moment and watch the days, hours, minutes, and seconds tick down live — with a shareable link.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var de = document.documentElement;
          de.setAttribute("data-theme", dark ? "dark" : "light");
          de.setAttribute("data-theme-mode", m);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=1" />
  </head>
  <body>
    <div class="heat" id="heat" aria-hidden="true"></div>

    <header class="topbar" aria-label="One Page Toys">
      <a class="brand" href="../../index.html">
        <span class="brand__mark" aria-hidden="true"></span>
        <span>One Page Toys</span>
      </a>
      <div class="topbar__right">
        <span class="topbar__tag">No. 052 · Countdown</span>
        <button type="button" class="iconbtn theme-toggle" data-theme-toggle aria-label="Theme: System (click to change)" title="Theme: System">
          <span class="theme-toggle__auto" aria-hidden="true">◐</span>
          <span class="theme-toggle__sun" aria-hidden="true">☀</span>
          <span class="theme-toggle__moon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>

    <main class="stage">
      <section class="meter" aria-label="Countdown">
        <input id="title" class="meter__title" value="New Year's Day" spellcheck="false" autocomplete="off" aria-label="Event name" maxlength="48" />

        <p class="meter__eyebrow" id="eyebrow">Days to go</p>
        <div class="odo" id="odo" role="text" aria-label="0">0</div>
        <p id="sub" class="sub">Name a moment and pick when — then watch it tick down.</p>

        <div class="console">
          <div class="numgrid" id="grid">
            <div class="numcard"><div class="numcard__val" id="hh">00</div><div class="numcard__label">Hours</div></div>
            <div class="numcard"><div class="numcard__val" id="mm">00</div><div class="numcard__label">Minutes</div></div>
            <div class="numcard"><div class="numcard__val" id="ss">00</div><div class="numcard__label">Seconds</div></div>
          </div>

          <div class="controls" style="margin-top:18px;">
            <div class="field field--plain" style="flex:1 1 280px;max-width:340px;">
              <label class="field__label" for="target">Target date &amp; time</label>
              <div class="field__box">
                <input id="target" class="field__input" type="datetime-local" />
              </div>
            </div>
          </div>

          <div class="presets" id="presets" role="group" aria-label="Quick events">
            <button type="button" class="preset" data-preset="newyear">🎆 New Year</button>
            <button type="button" class="preset" data-preset="christmas">🎄 Christmas</button>
            <button type="button" class="preset" data-preset="weekend">🎉 The weekend</button>
            <button type="button" class="preset" data-preset="friday">🍻 Friday 5pm</button>
          </div>

          <div class="actions">
            <button id="copyBtn" class="btn btn--primary" type="button">Copy share link</button>
          </div>

          <p id="status" class="meter__status" aria-live="polite">Ticking down in real time.</p>
        </div>
      </section>

      <a class="backlink" href="../../index.html">← onepagetoys.com</a>
    </main>

    <script src="script.js?v=1" defer></script>
    <script src="../../assets/theme.js?v=8" defer></script>
    <script src="../../assets/tip-jar.js?v=9" defer></script>
    <script src="../../assets/fullscreen.js?v=2" defer></script>
  </body>
</html>
