    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "World Clock Overlap",
        "url": "https://onepagetoys.com/tools/world-clock/",
        "description": "A visual world-clock overlap finder. Pick a few cities and see stacked day and night bars with the window where everyone is awake, with a draggable now-line to scrub through the day.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var de = document.documentElement;
          de.setAttribute("data-theme", dark ? "dark" : "light");
          de.setAttribute("data-theme-mode", m);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=1" />

  <body>
    <header class="topbar" aria-label="One Page Toys">
      <a class="brand" href="../../">
        <span class="brand__mark" aria-hidden="true"></span>
        <span>One Page Toys</span>
      </a>
      <div class="topbar__right">
        <span class="topbar__tag">No. 076 · World Clock</span>
        <button type="button" class="iconbtn theme-toggle" data-theme-toggle aria-label="Theme: System (click to change)" title="Theme: System">
          <span class="theme-toggle__auto" aria-hidden="true">◐</span>
          <span class="theme-toggle__sun" aria-hidden="true">☀</span>
          <span class="theme-toggle__moon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>

    <main class="stage">
      <section class="wc" aria-label="World clock overlap">
        <p class="eyebrow">Everyone's awake</p>
        <h1 class="headline" id="overlapText">—</h1>

        <div class="chart" id="chart">
          <div class="axis" id="axis" aria-hidden="true"></div>
          <div class="rows" id="rows"></div>
          <div class="overlay" id="overlay" aria-hidden="true">
            <div class="nowline" id="nowline"><span class="nowline__grip"></span><span class="nowline__lab" id="nowLab"></span></div>
          </div>
        </div>

        <div class="controls">
          <label class="addcity">
            <span class="addcity__plus" aria-hidden="true">+</span>
            <select id="addCity" aria-label="Add a city"></select>
          </label>
          <button type="button" class="btn btn--ghost" id="nowBtn">Jump to now</button>
        </div>
      </section>

      <a class="backlink" href="../../">← onepagetoys.com</a>
    </main>
