    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Life in Numbers",
        "url": "https://onepagetoys.com/tools/life-in-numbers/",
        "description": "Enter your birthday and watch your life tick up in real time: seconds lived, heartbeats, breaths, trips around the Sun, and a countdown to your next birthday.",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isPartOf": { "@type": "WebSite", "name": "One Page Toys", "url": "https://onepagetoys.com/" }
      }
    </script>
    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var de = document.documentElement;
          de.setAttribute("data-theme", dark ? "dark" : "light");
          de.setAttribute("data-theme-mode", m);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=2" />
  </head>
  <body>
    <div class="heat" id="heat" aria-hidden="true"></div>

    <header class="topbar" aria-label="One Page Toys">
      <a class="brand" href="../../">
        <span class="brand__mark" aria-hidden="true"></span>
        <span>One Page Toys</span>
      </a>
      <div class="topbar__right">
        <span class="topbar__tag">No. 049 · Life in Numbers</span>
        <button type="button" class="iconbtn theme-toggle" data-theme-toggle aria-label="Theme: System (click to change)" title="Theme: System">
          <span class="theme-toggle__auto" aria-hidden="true">◐</span>
          <span class="theme-toggle__sun" aria-hidden="true">☀</span>
          <span class="theme-toggle__moon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>

    <main class="stage">
      <section class="meter" aria-label="Life in numbers">
        <p class="meter__eyebrow">Seconds you've been alive</p>
        <div class="odo" id="odo" role="text" aria-label="0">0</div>
        <p id="sub" class="sub">Pick your birthday to bring your life to life.</p>

        <div class="console">
          <div class="controls">
            <div class="field field--plain" style="flex:1 1 260px;max-width:320px;">
              <label class="field__label" for="birthday">Your birthday</label>
              <div class="field__box">
                <input id="birthday" class="field__input" type="date" value="1995-06-15" />
              </div>
            </div>
          </div>

          <div class="numgrid" id="grid">
            <div class="numcard"><div class="numcard__val" id="days">–</div><div class="numcard__label">Days alive</div></div>
            <div class="numcard"><div class="numcard__val" id="beats">–</div><div class="numcard__label">Heartbeats ≈</div></div>
            <div class="numcard"><div class="numcard__val" id="breaths">–</div><div class="numcard__label">Breaths ≈</div></div>
            <div class="numcard"><div class="numcard__val" id="sun">–</div><div class="numcard__label">Trips ’round the Sun</div></div>
            <div class="numcard"><div class="numcard__val" id="moons">–</div><div class="numcard__label">Full moons ≈</div></div>
            <div class="numcard"><div class="numcard__val" id="next">–</div><div class="numcard__label">Next birthday</div></div>
          </div>

          <p id="status" class="meter__status" aria-live="polite">Every second counts.</p>
        </div>
      </section>

      <a class="backlink" href="../../">← onepagetoys.com</a>
    </main>

    <script src="../../assets/tickets.js?v=11" defer></script>
