    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Pomodoro Timer",
        "url": "https://onepagetoys.com/tools/pomodoro/",
        "description": "A focus timer using the Pomodoro method: focused work sprints alternating with short and long breaks, with a draining ring, session tracking, and a gentle chime on each switch.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Any",
        "browserRequirements": "Requires JavaScript. Requires HTML5.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },

      }

    <script>
      (function () {
        try {
          var m = localStorage.getItem("opt-theme");
          if (m !== "light" && m !== "dark" && m !== "system") m = "system";
          var dark = m === "dark" || (m === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var de = document.documentElement;
          de.setAttribute("data-theme", dark ? "dark" : "light");
          de.setAttribute("data-theme-mode", m);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="styles.css?v=1" />

  <body data-phase="focus">
    <header class="topbar" aria-label="One Page Toys">
      <a class="brand" href="../../">
        <span class="brand__mark" aria-hidden="true"></span>
        <span>One Page Toys</span>
      </a>
      <div class="topbar__right">
        <span class="topbar__tag">No. 075 · Pomodoro</span>
        <button type="button" class="iconbtn" id="soundBtn" aria-pressed="true" aria-label="Sound on" title="Sound on">♪</button>
        <button type="button" class="iconbtn theme-toggle" data-theme-toggle aria-label="Theme: System (click to change)" title="Theme: System">
          <span class="theme-toggle__auto" aria-hidden="true">◐</span>
          <span class="theme-toggle__sun" aria-hidden="true">☀</span>
          <span class="theme-toggle__moon" aria-hidden="true">☾</span>
        </button>
      </div>
    </header>

    <main class="stage">
      <section class="pomo" aria-label="Pomodoro timer">
        <p class="phase" id="phase">Focus</p>

        <div class="ring" id="ring">
          <svg class="ring__svg" viewBox="0 0 300 300" aria-hidden="true">
            <defs>
              <linearGradient id="pomograd" x1="0" y1="0" x2="1" y2="1">
                <stop class="pomograd-a" offset="0" stop-color="#ff7a5c" />
                <stop class="pomograd-b" offset="1" stop-color="#c23b28" />
              </linearGradient>
            </defs>
            <circle class="ring__track" cx="150" cy="150" r="132" />
            <circle class="ring__prog" id="ringProg" cx="150" cy="150" r="132" transform="rotate(-90 150 150)" />
          </svg>
          <div class="ring__center">
            <div class="time" id="time" role="timer" aria-live="off">25:00</div>
            <div class="dots" id="dots" aria-label="Focus sessions today"></div>
          </div>
        </div>

        <div class="actions">
          <button type="button" class="btn btn--primary" id="startBtn">Start</button>
          <button type="button" class="btn btn--ghost" id="resetBtn" aria-label="Reset this timer">Reset</button>
        </div>

        <div class="lengths" id="lengths" role="group" aria-label="Focus length">
          <button type="button" class="len" data-min="15">15 min</button>
          <button type="button" class="len is-on" data-min="25">25 min</button>
          <button type="button" class="len" data-min="50">50 min</button>
        </div>
      </section>

      <a class="backlink" href="../../">← onepagetoys.com</a>
    </main>
